# ── Secret（敏感配置：Redis 密码） ───────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: default
type: Opaque
data:
  # 密码为 123456 (echo -n "123456" | base64)
  password: MTIzNDU2
---
# ── ConfigMap（非敏感配置：后端环境变量） ────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: default
data:
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  APP_ENV: "production"
---
# ── ConfigMap（非敏感配置：前端 Nginx 代理配置，任务5要求）───────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: default
data:
  default.conf: |
    server {
        listen 80;
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }
        # 反向代理到内部的 backend-svc
        location /api/ {
            proxy_pass http://backend-svc:5000/api/;
        }
    }